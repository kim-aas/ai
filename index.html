<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marie — Lộ trình Chinh phục Tiếng Pháp B2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        :root {
            --primary: #1a73e8; --bg: #f8f9fa; --sidebar: #ffffff;
            --text: #202124; --border: #dadce0; --accent-bg: #e8f0fe;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }

        /* Sidebar */
        #sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .stats-bar { display: flex; justify-content: space-around; padding: 10px; background: #f1f3f4; font-size: 12px; }
        #lesson-list { flex: 1; overflow-y: auto; }
        .lesson-item { padding: 12px 20px; border-bottom: 1px solid #f1f3f4; cursor: pointer; transition: 0.2s; position: relative; }
        .lesson-item:hover { background: var(--accent-bg); }
        .lesson-item.active { border-left: 4px solid var(--primary); background: var(--accent-bg); font-weight: 600; }
        .lesson-item.completed::after { content: '✓'; position: absolute; right: 15px; color: #1e8e3e; }

        /* Main Area */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #header { height: 60px; border-bottom: 1px solid var(--border); background: #fff; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Messages */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; position: relative; }
        .msg.bot { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        
        /* Controls */
        #input-area { padding: 20px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        textarea { flex: 1; border: 1px solid var(--border); border-radius: 24px; padding: 12px 20px; resize: none; outline: none; height: 48px; }
        button { background: var(--primary); color: white; border: none; border-radius: 24px; padding: 0 20px; cursor: pointer; font-weight: 600; }
        
        /* Notebook Modal */
        #notebook { position: absolute; top: 60px; right: 0; width: 400px; height: calc(100% - 60px); background: white; border-left: 1px solid var(--border); z-index: 10; display: none; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }
        .notebook-content { flex: 1; overflow-y: auto; padding: 20px; }
        .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .speaker-btn { cursor: pointer; color: var(--primary); font-size: 18px; margin-left: 10px; }
        
        .tab-btn { background: none; color: var(--text); border: 1px solid var(--border); margin-left: 5px; padding: 5px 15px; }
        .btn-active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; color:var(--primary)">Marie AI 🇫🇷</h2>
        <div style="font-size: 12px; color: #666;">Objectif: B2 trong 6 tháng</div>
    </div>
    <div class="stats-bar">
        <span>🔥 Streak: <b id="streak-val">0</b> ngày</span>
        <span>✅ Xong: <b id="done-val">0</b>/24</span>
    </div>
    <div id="lesson-list"></div>
    <div style="padding: 15px; border-top: 1px solid #eee;">
        <button onclick="exportPDF()" style="width:100%; font-size:12px; background:#444;">Xuất PDF Báo Cáo</button>
    </div>
</div>

<div id="main">
    <div id="header">
        <div id="current-lesson-title">Chọn bài học để bắt đầu</div>
        <div>
            <button class="tab-btn" onclick="toggleNotebook()">Sổ tay (Vocab)</button>
        </div>
    </div>

    <div id="chat-box">
        <div class="msg bot">Bonjour! Tôi là Marie. Tôi đã được cấu hình với API của bạn. Chúng ta sẽ bắt đầu từ A1 và chinh phục B2 nhé. Chọn bài học đầu tiên bên trái nào!</div>
    </div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Nhập tin nhắn... (Nhấn Enter để gửi)"></textarea>
        <button onclick="handleSend()">Gửi</button>
    </div>

    <div id="notebook">
        <div style="padding:15px; border-bottom:1px solid #eee; font-weight:bold; display:flex; justify-content:space-between">
            Sổ tay từ vựng 📒
            <span style="cursor:pointer" onclick="toggleNotebook()">✕</span>
        </div>
        <div class="notebook-content" id="vocab-list"></div>
    </div>
</div>

<script>
const API_KEY = "AIzaSyCIxoRei5XMnV8T5qrmrhYqxvPYVTlstIY";
const MODEL_NAME = "gemini-1.5-flash"; // Đã sửa tên model

// Lộ trình học (Curriculum)
const CURRICULUM = [
    {id:1, level:'A1', title:'Bài 1: Chào hỏi & Làm quen', goal:'Tháng 1'},
    {id:2, level:'A1', title:'Bài 2: Gia đình & Nghề nghiệp', goal:'Tháng 1'},
    {id:3, level:'A1', title:'Bài 3: Mua sắm & Ăn uống', goal:'Tháng 1'},
    {id:4, level:'A2', title:'Bài 4: Kể về quá khứ', goal:'Tháng 2'},
    {id:5, level:'A2', title:'Bài 5: Dự định tương lai', goal:'Tháng 2'},
    {id:6, level:'B1', title:'Bài 6: Quan điểm cá nhân', goal:'Tháng 3-4'},
    {id:7, level:'B2', title:'Bài 7: Tranh luận & Thời sự', goal:'Tháng 5-6'},
];

let state = JSON.parse(localStorage.getItem('marie_state')) || {
    completedLessons: [],
    vocab: [],
    streak: 0,
    lastDate: null
};

let chatHistory = [];
let currentLesson = null;

// Khởi tạo giao diện
function init() {
    const list = document.getElementById('lesson-list');
    CURRICULUM.forEach(l => {
        const item = document.createElement('div');
        item.className = `lesson-item ${state.completedLessons.includes(l.id) ? 'completed' : ''}`;
        item.innerHTML = `<small>${l.level} - ${l.goal}</small><br>${l.title}`;
        item.onclick = () => startLesson(l, item);
        list.appendChild(item);
    });
    updateStats();
    renderVocab();
}

function updateStats() {
    document.getElementById('streak-val').innerText = state.streak;
    document.getElementById('done-val').innerText = state.completedLessons.length;
    localStorage.setItem('marie_state', JSON.stringify(state));
}

function toggleNotebook() {
    const nb = document.getElementById('notebook');
    nb.style.display = nb.style.display === 'flex' ? 'none' : 'flex';
}

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'fr-FR';
    window.speechSynthesis.speak(msg);
}

function startLesson(lesson, el) {
    currentLesson = lesson;
    document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('current-lesson-title').innerText = lesson.title;
    
    chatHistory = [];
    document.getElementById('chat-box').innerHTML = '';
    
    const prompt = `Bắt đầu dạy tôi ${lesson.title} (${lesson.level}). Hãy chào bằng tiếng Pháp, dạy tôi 3 câu mẫu và sau đó hỏi tôi một câu để thực hành.`;
    callGemini(prompt);
}

async function callGemini(userText) {
    const chatBox = document.getElementById('chat-box');
    const loadingId = addMessage('bot', 'Marie đang soạn bài...');

    const systemPrompt = `Bạn là Marie, giáo viên tiếng Pháp chuyên nghiệp. 
    Lộ trình: Giúp học sinh đạt B2 trong 6 tháng.
    Quy tắc:
    1. Nói tiếng Pháp, luôn có bản dịch tiếng Việt trong ngoặc ().
    2. Nếu học sinh yêu cầu "Xong bài", hãy đưa ra 1 câu hỏi Quiz trắc nghiệm.
    3. Cuối mỗi bài giảng, hãy liệt kê từ vựng theo cấu trúc: [VOCAB] từ: nghĩa.
    4. Thân thiện, kiên nhẫn.`;

    try {
        const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [
                    { role: "user", parts: [{ text: systemPrompt + "\n\nTin nhắn học viên: " + userText }] }
                ],
                generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
            })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const botText = data.candidates.content.parts.text;
        
        document.getElementById(loadingId).remove();
        addMessage('bot', botText);
        extractVocab(botText);

    } catch (e) {
        document.getElementById(loadingId).innerText = "Lỗi: " + e.message;
    }
}

function extractVocab(text) {
    const lines = text.split('\n');
    lines.forEach(line => {
        if (line.includes('[VOCAB]')) {
            const pair = line.replace('[VOCAB]', '').split(':');
            if (pair.length === 2) {
                const word = pair.trim();
                const mean = pair.trim();
                if (!state.vocab.find(v => v.f === word)) {
                    state.vocab.push({ f: word, v: mean });
                    renderVocab();
                    updateStats();
                }
            }
        }
    });
}

function renderVocab() {
    const list = document.getElementById('vocab-list');
    list.innerHTML = state.vocab.map(v => `
        <div class="vocab-item">
            <span><b>${v.f}</b>: ${v.v}</span>
            <span class="speaker-btn" onclick="speak('${v.f}')">🔊</span>
        </div>
    `).join('');
}

function addMessage(role, text) {
    const id = 'm-' + Date.now();
    const chatBox = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.id = id;
    div.innerHTML = text.replace(/\n/g, '<br>');
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return id;
}

function handleSend() {
    const input = document.getElementById('user-input');
    const val = input.value.trim();
    if (!val) return;
    
    addMessage('user', val);
    input.value = '';
    
    if (val.toLowerCase() === 'xong bài') {
        if (currentLesson && !state.completedLessons.includes(currentLesson.id)) {
            state.completedLessons.push(currentLesson.id);
            checkStreak();
            updateStats();
            document.querySelector('.lesson-item.active').classList.add('completed');
        }
    }
    
    callGemini(val);
}

function checkStreak() {
    const today = new Date().toLocaleDateString();
    if (state.lastDate !== today) {
        state.streak++;
        state.lastDate = today;
    }
}

function exportPDF() {
    let content = `BÁO CÁO HỌC TẬP MARIE AI\n`;
    content += `Streak: ${state.streak} ngày | Bài học hoàn thành: ${state.completedLessons.length}/24\n\n`;
    content += `DANH SÁCH TỪ VỰNG:\n`;
    state.vocab.forEach(v => content += `- ${v.f}: ${v.v}\n`);
    
    const blob = new Blob([content], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'marie-french-report.txt';
    link.click();
}

// Enter để gửi
document.getElementById('user-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
    }
});

init();
</script>
</body>
</html>
