<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marie AI — Chinh phục Tiếng Pháp B2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&display=swap');
  :root {
    --bg: #f7f4ef; --surface: #ffffff; --accent: #2d5a3d; 
    --text: #1a1814; --border: rgba(0,0,0,0.1); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  #topbar { height: 60px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; color: var(--accent); font-style: italic; font-weight: bold; }
  
  #layout { display: flex; flex: 1; overflow: hidden; }
  
  /* Sidebar */
  #sidebar { width: 300px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-hdr { padding: 15px; font-weight: bold; background: #fdfcf9; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  #lesson-list { flex: 1; overflow-y: auto; padding: 10px; }
  .lesson-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; font-size: 13px; transition: 0.2s; border: 1px solid transparent; position: relative; }
  .lesson-item:hover { background: #f0f4f8; }
  .lesson-item.active { background: #eef4f0; border-color: var(--accent); font-weight: 500; }
  .lesson-item.done::after { content: '✓'; position: absolute; right: 10px; color: var(--accent); font-weight: bold; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
  #tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); }
  .tab { padding: 15px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; flex: 1; text-align: center; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }

  #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  .bubble { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
  .msg.bot .bubble { background: #fff; border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.user .bubble { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }

  #input-row { padding: 15px 20px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  textarea { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; resize: none; outline: none; height: 44px; font-size: 14px; }
  #send-btn { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }

  /* Vocab */
  .panel { display: none; flex: 1; padding: 20px; overflow-y: auto; }
  .panel.active { display: flex; flex-direction: column; }
  .v-card { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
  .speak-btn { background: #f0f4f8; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Marie AI</div>
  <div style="font-size: 13px;">🔥 Streak: <span id="streak">0</span> ngày | Lớp: <span id="progress">0</span>/24</div>
  <button onclick="exportData()" style="padding: 5px 10px; font-size: 12px; cursor: pointer;">Xuất PDF</button>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sidebar-hdr">Lộ trình 6 tháng (A1-B2)</div>
    <div id="lesson-list"></div>
  </div>

  <div id="main">
    <div id="tabs">
      <div class="tab active" data-tab="chat-area">Học tập</div>
      <div class="tab" data-tab="vocab">Từ vựng</div>
      <div class="tab" data-tab="review">Ôn tập</div>
    </div>

    <div id="chat-area" class="panel active">
      <div id="messages">
        <div class="msg bot"><div class="bubble">Bonjour! Marie đã sẵn sàng với model Gemini 2.0 Flash cực nhanh. Hãy chọn bài học để chúng ta bắt đầu hành trình B2 nhé! 🇫🇷</div></div>
      </div>
      <div id="input-row">
        <textarea id="user-input" placeholder="Nhập tin nhắn... (hoặc gõ 'Xong bài')"></textarea>
        <button id="send-btn">Gửi</button>
      </div>
    </div>

    <div id="vocab" class="panel">
      <div id="vocab-list"></div>
    </div>

    <div id="review" class="panel" style="text-align:center; justify-content:center;">
      <div id="review-box">
        <p>Hệ thống Ghi nhớ ngắt quãng (SRS) đang chờ từ vựng mới...</p>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = "AIzaSyCIxoRei5XMnV8T5qrmrhYqxvPYVTlstIY";
// CHÚ Ý: Model chính xác cho Gemini API 2.0
const MODEL = "models/gemini-2.0-flash"; 

let state = JSON.parse(localStorage.getItem('marie_v2')) || {
  done: [], vocab: [], streak: 0, lastDate: null
};

const CURRICULUM = [
  {id:1, lvl:'A1', t:'Chào hỏi & Giới thiệu'}, {id:2, lvl:'A1', t:'Số đếm & Thời gian'},
  {id:3, lvl:'A2', t:'Thì hiện tại (Présent)'}, {id:4, lvl:'A2', t:'Đi du lịch & Hỏi đường'},
  {id:5, lvl:'B1', t:'Quá khứ (Passé Composé)'}, {id:6, lvl:'B1', t:'Diễn tả cảm xúc'},
  {id:7, lvl:'B2', t:'Thức giả định (Subjonctif)'}, {id:8, lvl:'B2', t:'Tranh luận chính trị'}
];

function save() {
  localStorage.setItem('marie_v2', JSON.stringify(state));
  document.getElementById('streak').innerText = state.streak;
  document.getElementById('progress').innerText = state.done.length;
}

// Render bài học
const lessonList = document.getElementById('lesson-list');
CURRICULUM.forEach(l => {
  const div = document.createElement('div');
  div.className = `lesson-item ${state.done.includes(l.id) ? 'done' : ''}`;
  div.innerHTML = `<b>${l.lvl}</b>: ${l.t}`;
  div.onclick = () => startLesson(l, div);
  lessonList.appendChild(div);
});

async function startLesson(lesson, el) {
  document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('messages').innerHTML = '';
  
  const prompt = `Bạn là Marie, giáo viên tiếng Pháp. Dạy tôi bài "${lesson.t}" (${lesson.lvl}). 
  Yêu cầu: Giải thích ngắn gọn, dịch Việt trong ngoặc (). 
  Kết thúc bằng format "VOCAB: từ=nghĩa | từ2=nghĩa2" và 1 câu hỏi thực hành.`;
  
  callGemini(prompt);
}

async function callGemini(text) {
  const mid = addMsg('bot', 'Marie đang soạn tin...');
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${MODEL}:generateContent?key=${KEY}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: text }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 1000 }
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates.content.parts.text;
    document.getElementById(mid).remove();
    addMsg('bot', reply);
    
    // Auto-save Vocab
    if (reply.includes('VOCAB:')) {
      const parts = reply.split('VOCAB:').split('|');
      parts.forEach(p => {
        const [f, v] = p.split('=');
        if (f && v) state.vocab.push({f: f.trim(), v: v.trim(), date: Date.now()});
      });
      save();
    }
  } catch (e) {
    document.getElementById(mid).innerText = "Lỗi: " + e.message;
  }
}

function addMsg(role, text) {
  const id = 'm' + Date.now();
  const div = document.createElement('div');
  div.className = `msg ${role}`; div.id = id;
  div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
  const box = document.getElementById('messages');
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return id;
}

document.getElementById('send-btn').onclick = () => {
  const inp = document.getElementById('user-input');
  const val = inp.value.trim();
  if (!val) return;
  addMsg('user', val);
  
  if (val.toLowerCase().includes('xong bài')) {
    const active = document.querySelector('.lesson-item.active');
    if (active) {
      const id = CURRICULUM.find(c => active.innerText.includes(c.t)).id;
      if (!state.done.includes(id)) {
        state.done.push(id);
        active.classList.add('done');
        updateStreak();
      }
    }
  }
  callGemini(val);
  inp.value = '';
};

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDate !== today) {
    state.streak++;
    state.lastDate = today;
    save();
  }
}

function speak(t) {
  const s = new SpeechSynthesisUtterance(t);
  s.lang = 'fr-FR';
  window.speechSynthesis.speak(s);
}

// Tab Switching
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'vocab') renderVocab();
  };
});

function renderVocab() {
  const list = document.getElementById('vocab-list');
  list.innerHTML = state.vocab.map(v => `
    <div class="v-card">
      <span><b>${v.f}</b>: ${v.v}</span>
      <button class="speak-btn" onclick="speak('${v.f}')">🔊 Nghe</button>
    </div>
  `).join('');
}

function exportData() {
  let content = "BAO CAO MARIE AI\nStreak: " + state.streak + "\nTu vung:\n";
  state.vocab.forEach(v => content += `- ${v.f}: ${v.v}\n`);
  const blob = new Blob([content], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'marie-report.txt';
  a.click();
}

save();
</script>
</body>
</html>
